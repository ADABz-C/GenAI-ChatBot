<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Tech Mentor</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="app">

    <!-- HEADER -->
    <div class="header">
        <div class="icon">[←]</div>

        <div class="header-text">
            <div class="title">Your Tech Mentor</div>
            <div class="status">
                <span class="dot"></span> Online
            </div>
        </div>

        <div class="icon">[X]</div>
    </div>

    <!-- CHAT -->
    <div id="chat-box" class="chat-box"></div>

    <!-- SUGGESTIONS -->
    <div id="suggestions" class="suggestions">
        <button>Video Editing</button>
        <button>Presentation</button>
        <button>Convert Word to PDF</button>
        <button>Go to IU Knowledge Base</button>
    </div>

    <!-- INPUT -->
    <div class="input-area">
        <input id="user-input" placeholder="Ask about IU software..." />
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script src="index.js"></script>
</body>
</html>
