<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IU Tech Concierge</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="chat-header">
    IU Tech Concierge
</div>
<div class="chat-container">

    <!-- Header -->
    <div class="chat-header">
        <!-- Replace with your IU logo -->
        <img src="" alt="IU Logo" class="logo">
    </div>

    <!-- Chat Box -->
    <div class="chat-box" id="chatBox">
        <div class="message bot">
            <p>Hello! I'm your IU Tech Concierge. How can I help?</p>
        </div>
    </div>

    <!-- Input Area -->
    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Ask something...">
        
        <!-- Replace with your send icon -->
        <button id="sendBtn">
            <img src="" alt="Send">
        </button>
    </div>

</div>

<script src="index.js"></script>
</body>
</html>
